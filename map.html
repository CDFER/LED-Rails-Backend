<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
    <script>
        // --- Dynamic Title based on URL ---
        (function () {
            // Try to extract region from pathname, e.g. /wlg-ltm/api/map or /WLG/api/map
            const path = window.location.pathname.toLowerCase();
            const match = path.match(/^\/?([^\/-]+)(?:-ltm)?[^\/]*\/api/);
            if (match) {
                const region = match[1].toUpperCase();
                document.title = region + ' Map';
            }
        })();
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .status-overlay {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 0.9em;
        }

        .vehicle-marker {
            background-color: #3388ff;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 5px;
            height: 5px;
        }

        .vehicle-marker.stale {
            background-color: #808080;
        }

        .vehicle-arrow {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vehicle-arrow-shape {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 36px solid #3388ff;
            opacity: 0.95;
        }

        .vehicle-arrow.stale .vehicle-arrow-shape {
            border-bottom-color: #808080;
        }

        #map,
        .leaflet-container,
        .leaflet-layer {
            background: #000 !important;
        }

        .leaflet-tile {
            filter: grayscale(1) brightness(1.1) contrast(1.1) invert(1.0);
        }

        #search-container {
            position: absolute;
            top: 10px;
            right: 50px;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        }

        #vehicle-search {
            width: 180px;
            padding: 4px 8px;
            border-radius: 3px;
            border: 1px solid #aaa;
            outline: none;
        }

        #search-results {
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            font-size: 0.95em;
        }

        #search-results div {
            cursor: pointer;
            padding: 2px 0;
        }

        #search-results div.stale {
            font-style: italic;
            opacity: 0.6;
            color: #666;
        }

        .leaflet-popup-content {
            width: auto !important;
            max-width: 800px !important;
            white-space: nowrap;
        }
    </style>
</head>

        // --- Relative Time Formatter ---
        function getRelativeTime(timestamp) {
            const diff = Date.now() - timestamp;
            const absDiff = Math.abs(diff);

            if (absDiff < 60 * 60 * 1000) {
                const minutes = Math.floor(absDiff / 60000);
                const seconds = Math.floor((absDiff % 60000) / 1000);
                if (minutes === 0) {
                    return `${seconds}s ago`;
                }
                return `${minutes}m ${seconds}s ago`;
            }

            const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
            const units = [
                { unit: 'year', ms: 365 * 24 * 60 * 60 * 1000 },
                { unit: 'month', ms: 28 * 24 * 60 * 60 * 1000 },
                { unit: 'week', ms: 7 * 24 * 60 * 60 * 1000 },
                { unit: 'day', ms: 24 * 60 * 60 * 1000 },
                { unit: 'hour', ms: 60 * 60 * 1000 },
            ];
            for (const { unit, ms } of units) {
                if (absDiff >= ms) {
                    const value = Math.floor(diff / ms);
                    return rtf.format(-value, unit);
                }
            }
            return '';
        }

        const DEFAULT_ARROW_COLOR = '#ff00ff';
        let vehicleLabels = new Map(); // Map label (lowercase) to vehicleId

        // --- Search UI ---
        const searchInput = document.getElementById('vehicle-search');
        const searchResults = document.getElementById('search-results');

        function updateSearchResults(query) {
            searchResults.innerHTML = '';
            if (!query) return;

            let filterFn;
            if (query.includes('*')) {
                const parts = query.split('*').map(s => s.replace(/[.+?^${}()|[\]\\]/g, '\\$&'));
                const regex = new RegExp(parts.join('.*'), 'i');
                filterFn = ([label]) => regex.test(label);
            } else {
                const upperQuery = query.toUpperCase();
                filterFn = ([label]) => label.includes(upperQuery);
            }

            const matches = Array.from(vehicleLabels.entries())
                .filter(filterFn)
                .sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

            matches.forEach(([label, data]) => {
                const vehicleId = data.id;
                const div = document.createElement('div');
                div.textContent = label;
                if (data.isStale) {
                    div.className = 'stale';
                }
                div.onclick = () => {
                    const marker = vehicleMarkers.get(vehicleId);
                    if (marker) {
                        map.setView(marker.getLatLng(), 16, { animate: true });
                        marker.openPopup();
                    }
                    searchResults.innerHTML = '';
                    searchInput.value = '';
                };
                searchResults.appendChild(div);
            });
        }
        searchInput.addEventListener('input', e => updateSearchResults(e.target.value));
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                searchResults.innerHTML = '';
                searchInput.value = '';
            }
        });
        document.addEventListener('click', e => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {

            }
        });

        function createArrowIcon(bearing, isStale, color) {
            const arrowColor = isStale ? '#808080' : (color || DEFAULT_ARROW_COLOR);

            // If no bearing is provided, show a circle instead of an arrow
            if (bearing === undefined || bearing === null) {
                return L.divIcon({
                    className: '',
                    iconSize: [14, 14],
                    iconAnchor: [7, 7],
                    html: `<div style="width: 100%; height: 100%; background-color: ${arrowColor}; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.8); box-sizing: border-box;"></div>`
                });
            }

            // bearing: degrees, 0 = north
            const rotation = `rotate(${bearing}deg)`;
            return L.divIcon({
                className: `vehicle-arrow${isStale ? ' stale' : ''}`,
                iconSize: [18, 18],
                iconAnchor: [9, 9],
                html: `<div class="vehicle-arrow-shape" style="transform: ${rotation}; border-bottom-color: ${arrowColor};"></div>`
            });
        }

        // Helper to generate popup content for a vehicle
        function getVehiclePopupContent(vehicleInfo, vehicleId, trip, direction, latitude, longitude, position, vehicleData, entity) {
            const stopIds = entity.tripUpdate?.stopTimeUpdate?.map(stu => stu.stopId) || [];
            const stops = stopsMap ? stopIds.map(id => stopsMap[id]) : [];
            return `
                ${vehicleInfo?.label ? `<b>Label:</b> ${vehicleInfo.label.toUpperCase()}<br>` : ''}
                ${vehicleId ? `<b>Vehicle ID:</b> ${vehicleId}<br>` : ''}
                ${trip?.route_id ? `<b>Route:</b> ${trip.route_id + (direction || '')}<br>` : ''}
                ${trip?.routeId ? `<b>Route:</b> ${trip.routeId}<br>` : ''}
                ${trip?.trip_id ? `<b>Trip:</b> ${trip.trip_id}<br>` : ''}
                ${trip?.tripId ? `<b>Trip:</b> ${trip.tripId}<br>` : ''}
                ${latitude !== undefined ? `<b>Lat:</b> ${latitude.toFixed(5)}` : ''}, ${longitude !== undefined ? `<b>Long:</b> ${longitude.toFixed(5)}<br>` : ''}
                ${position?.bearing !== undefined ? `<b>Bearing:</b> ${Number(position.bearing).toFixed(0)}°<br>` : ''}
                ${position?.speed !== undefined ? `<b>Speed:</b> ${(position.speed * 3.6).toFixed(0)}km/h<br>` : ''}
                ${position?.odometer !== undefined ? `<b>Odometer:</b> ${Number((position.odometer / 1000).toFixed(0)).toLocaleString('en-NZ')} km<br>` : ''}
                ${vehicleData?.timestamp ? `<b>Last Update:</b> <span class="live-relative-time" data-timestamp="${vehicleData.timestamp * 1000}">${getRelativeTime(vehicleData.timestamp * 1000)}</span><br>` : ''}
                ${(() => {
                    if (stopIds.length === 0) return '';
                    const stopList = stops.map((s, i) => {
                        if (!s) return `(${stopIds[i]})<br>`;
                        const stopName = s.stop_name.replace(/station|platform/gi, '').replace(/,/g, '').replace(/\s+/g, ' ').trim();
                        // If stopName ends with a number, do not append platform_code
                        const platform = (s.platform_code && !/\d+$/.test(stopName)) ? ' ' + s.platform_code : '';
                        const arrivalTs = entity.tripUpdate?.stopTimeUpdate?.[i]?.arrival?.time;
                        const departureTs = entity.tripUpdate?.stopTimeUpdate?.[i]?.departure?.time;

                        let timeString = '';
                        const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

                        if (arrivalTs && departureTs && arrivalTs !== departureTs) {
                            const diff = departureTs - arrivalTs;
                            timeString = `- ${formatTime(arrivalTs)} (+${diff}s)`;
                        } else if (arrivalTs) {
                            timeString = `- ${formatTime(arrivalTs)}`;
                        } else if (departureTs) {
                            timeString = `- ${formatTime(departureTs)}`;
                        }

                        //if (!platform) {
                        //    console.warn(`No platform code given for: ${s.stop_name} (${vehicleId})`);
                        //}
                        return `<i>- ${stopName}${platform} (${stopIds[i]}) ${timeString}</i><br>`;
                    });

                    const DEFAULT_MAX_STOPS = 5;
                    const now = Math.floor(Date.now() / 1000);
                    let firstUpcomingIndex = stopIds.length;

                    for (let i = 0; i < stopIds.length; i++) {
                        const arrivalTs = entity.tripUpdate?.stopTimeUpdate?.[i]?.arrival?.time;
                        const departureTs = entity.tripUpdate?.stopTimeUpdate?.[i]?.departure?.time;
                        const ts = departureTs || arrivalTs;
                        // use a 60 second buffer for past stops
                        if (ts && ts >= now - 60) {
                            firstUpcomingIndex = i;
                            break;
                        }
                    }
                    // If no upcoming stops are found, default to showing the very last stops
                    if (firstUpcomingIndex === stopIds.length) {
                        firstUpcomingIndex = Math.max(0, stopList.length - DEFAULT_MAX_STOPS);
                    }

                    if (stopList.length <= DEFAULT_MAX_STOPS) {
                        return `<b>Stops:</b><br>${stopList.join('')}`;
                    } else {
                        const endIndex = firstUpcomingIndex + DEFAULT_MAX_STOPS;
                        const visibleStops = stopList.slice(firstUpcomingIndex, endIndex).join('');
                        const hiddenStopsBefore = stopList.slice(0, firstUpcomingIndex).join('');
                        const hiddenStopsAfter = stopList.slice(endIndex).join('');

                        const hiddenCount = stopList.length - stopList.slice(firstUpcomingIndex, endIndex).length;

                        if (hiddenCount === 0) {
                            return `<b>Stops:</b><br>${stopList.join('')}`;
                        }

                        const isExpanded = expandedVehicles.has(vehicleId);
                        const displayStyle = isExpanded ? 'block' : 'none';
                        const buttonText = isExpanded ? 'Show less' : `Show ${hiddenCount} hidden stops`;

                        return `<b>Stops:</b><br>
                            <div class="stops-list-container">
                                <div style="display: ${displayStyle};" class="hidden-stops">${hiddenStopsBefore}</div>
                                <div>${visibleStops}</div>
                                <div style="display: ${displayStyle};" class="hidden-stops">${hiddenStopsAfter}</div>
                                <button data-vehicle-id="${vehicleId}" onclick="const hiddenDivs = this.parentElement.querySelectorAll('.hidden-stops'); const isHidden = hiddenDivs[0].style.display === 'none'; hiddenDivs.forEach(d => d.style.display = isHidden ? 'block' : 'none'); this.innerText = isHidden ? 'Show less' : 'Show ${hiddenCount} hidden stops'; if (isHidden) { expandedVehicles.add(this.dataset.vehicleId); } else { expandedVehicles.delete(this.dataset.vehicleId); }" style="margin-top: 4px; font-size: 0.9em; padding: 2px 6px; cursor: pointer;">${buttonText}</button>
                            </div>`;
                    }
                })()}
            `;
        }


        let hasSetView = false;
        async function fetchAndDisplayVehicles() {
            try {
                const response = await fetch(API_ENDPOINT);
                const vehicleEntities = await response.json();
                const seenVehicleIds = new Set();
                let staleCount = 0;

                vehicleEntities.forEach(entity => {
                    const vehicleData = entity?.vehicle;
                    if (!vehicleData) return;
                    const position = vehicleData?.position;
                    const vehicleId = vehicleData?.vehicle?.id;
                    const vehicleInfo = vehicleData?.vehicle;
                    const latitude = position?.latitude;
                    const longitude = position?.longitude;
                    const ageInMs = vehicleData.timestamp ? Date.now() - (vehicleData.timestamp * 1000) : Infinity;
                    const isStale = ageInMs > STALE_TIMEOUT_MS;
                    const trip = vehicleData?.trip;
                    const routeId = trip?.route_id || trip?.routeId || '';
                    const direction = `-${trip?.direction_id} `;

                    // Determine arrow color based on route ID, with partial matching fallback
                    let arrowColor = ROUTE_COLORS[routeId];
                    if (!arrowColor) {
                        const bestMatch = Object.keys(ROUTE_COLORS)
                            .filter(key => routeId.includes(key))
                            .sort((a, b) => b.length - a.length)[0];
                        arrowColor = bestMatch ? ROUTE_COLORS[bestMatch] : DEFAULT_ARROW_COLOR;
                    }

                    if (arrowColor === DEFAULT_ARROW_COLOR) {
                        console.warn(`No route color defined for route ID: ${routeId}`);
                    }

                    if (vehicleId && position?.latitude && position?.longitude) {
                        seenVehicleIds.add(vehicleId);
                        const latLng = [position.latitude, position.longitude];
                        const icon = createArrowIcon(position.bearing, isStale, arrowColor);

                        // Use label if available, otherwise fallback to ID. Some feeds don't provide a label.
                        const searchLabel = vehicleInfo?.label || vehicleId;
                        if (searchLabel) {
                            vehicleLabels.set(searchLabel.toUpperCase(), { id: vehicleId, timestamp: vehicleData.timestamp, isStale: isStale });
                        }

                        // Use timestamp as zIndexOffset so newer updates appear on top
                        const zOffset = vehicleData.timestamp || 0;

                        if (vehicleMarkers.has(vehicleId)) {
                            const marker = vehicleMarkers.get(vehicleId);
                            marker.setLatLng(latLng)
                                .setIcon(icon)
                                .setZIndexOffset(zOffset)
                                .setPopupContent(getVehiclePopupContent(vehicleInfo, vehicleId, trip, direction, latitude, longitude, position, vehicleData, entity));
                        } else {
                            const marker = L.marker(latLng, { icon, zIndexOffset: zOffset })
                                .bindPopup(getVehiclePopupContent(vehicleInfo, vehicleId, trip, direction, latitude, longitude, position, vehicleData, entity))
                                .addTo(map);
                            vehicleMarkers.set(vehicleId, marker);
                        }

                        if (isStale) {
                            staleCount++;
                        }
                    }
                });

                if (!hasSetView && vehicleMarkers.size > 0) {
                    const bounds = L.latLngBounds(Array.from(vehicleMarkers.values()).map(marker => marker.getLatLng()));
                    map.fitBounds(bounds);
                    hasSetView = true;
                }

                // Remove old markers
                vehicleMarkers.forEach((marker, id) => {
                    if (!seenVehicleIds.has(id)) {
                        map.removeLayer(marker);
                        vehicleMarkers.delete(id);
                    }
                });

                STATUS_ELEMENT.textContent = `${vehicleMarkers.size} (${vehicleMarkers.size - staleCount} active)`;
            } catch (error) {
                console.error('Vehicle Error:', error);
                STATUS_ELEMENT.textContent = `Error: ${error.message}`;
            }
        }

        // --- Initial Fetch and Periodic Refresh ---
        fetchAndDisplayVehicles(); // Initial load
        setInterval(fetchAndDisplayVehicles, REFRESH_INTERVAL_MS); // Refresh periodically

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                fetchAndDisplayVehicles();
            }
        });

        // --- Live Update of Relative Times ---
        setInterval(() => {
            document.querySelectorAll('.live-relative-time').forEach(el => {
                const ts = parseInt(el.getAttribute('data-timestamp'));
                if (ts) el.textContent = getRelativeTime(ts);
            });
        }, 1000);

    </script>

</body>

</html>
